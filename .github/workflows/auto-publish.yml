name: Auto Publish Anime Articles

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: auto-publish-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Sync with remote
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Cache llama binary
        uses: actions/cache@v4
        id: cache-llama
        with:
          path: ~/.cache/llama-bin
          key: llama-cpp-bin-v3

      - name: Cache GGUF model
        uses: actions/cache@v4
        id: cache-model
        with:
          path: ~/.cache/gguf-models
          key: gguf-qwen25-1.5b-v1

      - name: Setup model and llama.cpp
        run: |
          chmod +x scripts/setup_model.sh
          bash scripts/setup_model.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser==6.0.11 requests==2.31.0 python-slugify==8.0.4 python-dateutil==2.9.0

      - name: Verify setup
        run: |
          echo "=== Files ==="
          ls scripts/
          echo "=== Model ==="
          ls ~/.cache/gguf-models/ 2>/dev/null || echo "No model"
          echo "=== Binary ==="
          ls ~/.cache/llama-bin/ 2>/dev/null || echo "No binary"
          which llama-cli 2>/dev/null || echo "llama-cli not in PATH"

      - name: Run publisher
        run: |
          python scripts/main.py

      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain src/content/posts data/published.json 2>/dev/null)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes found"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes"
          fi

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "AniTube Buzz Bot"
          git config user.email "bot@anitubebuzz.com"
          git add src/content/posts data/published.json
          git commit -m "Auto: New anime articles - $(date +'%Y-%m-%d %H:%M')" || echo "Nothing to commit"
          git push origin HEAD:main

      - name: Done
        run: echo "Completed at $(date)"
