name: Auto Publish

on:
  schedule:
    - cron: '0 */3 * * *'  # Every 3 hours
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with remote
        run: git reset --hard origin/main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser requests python-slugify python-dateutil

      # ═══ NEW: Fetch anime backgrounds ═══
      - name: Fetch anime background images
        run: python scripts/fetch_bg_images.py

      # Existing: Facebook videos (optional, keep or remove)
      - name: Fetch Facebook videos
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        run: python scripts/fetch_facebook_videos.py
        continue-on-error: true

      # Existing: Article publisher
      - name: Publish articles
        run: python scripts/main.py

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "auto: update backgrounds + articles"
            git push
          else
            echo "No changes to commit"
          fi
