name: Auto Publish

on:
  schedule:
    - cron: '0 */3 * * *'  # Every 3 hours
  workflow_dispatch:

# ═══ ADD THIS PERMISSIONS BLOCK ═══
permissions:
  contents: write
  actions: write
# ═══════════════════════════════════

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Sync with remote
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser requests python-slugify python-dateutil

      - name: Fetch anime background images
        run: python scripts/fetch_bg_images.py
        continue-on-error: true

      - name: Fetch Facebook videos
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        run: python scripts/fetch_facebook_videos.py
        continue-on-error: true

      - name: Publish articles
        run: python scripts/main.py
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update backgrounds, videos, articles"
            git push origin main
          fi
