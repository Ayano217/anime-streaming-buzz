name: Auto Publish Anime Articles

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: auto-publish-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Sync with remote
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Cache llama binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/llama-bin
          key: llama-cpp-bin-v3

      - name: Cache GGUF model
        uses: actions/cache@v4
        with:
          path: ~/.cache/gguf-models
          key: gguf-qwen25-1.5b-v1

      - name: Setup model and llama.cpp
        run: |
          chmod +x scripts/setup_model.sh
          bash scripts/setup_model.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser==6.0.11 requests==2.31.0 python-slugify==8.0.4 python-dateutil==2.9.0

      - name: Fetch Facebook videos
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        run: |
          python scripts/fetch_facebook_videos.py || echo "FB fetch skipped"

      - name: Run article publisher
        run: |
          python scripts/main.py

      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

            - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Auto: New articles + site update"
          git push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "AniTube Buzz Bot"
          git config user.email "bot@anitubebuzz.com"
          git add -A
          git commit -m "Auto: Update - $(date +'%Y-%m-%d %H:%M')" || echo "Nothing"
          git push origin HEAD:main

      - name: Done
        run: echo "Done at $(date)"
