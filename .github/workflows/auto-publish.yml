name: Auto Publish Anime Articles

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip uninstall -y openai httpx || true
          pip install -r scripts/requirements.txt
          pip check

      - name: Debug current commit and files
        run: |
          echo "===== CURRENT BRANCH ====="
          git branch --show-current
          echo "===== CURRENT COMMIT ====="
          git rev-parse HEAD
          echo "===== LATEST COMMIT ====="
          git log -1 --oneline
          echo "===== scripts/main.py ====="
          sed -n '1,25p' scripts/main.py
          echo "===== scripts folder ====="
          ls -la scripts
          echo "===== grep generate_article in main.py ====="
          grep -n "generate_article" scripts/main.py || true

      - name: Run Auto Publisher
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python scripts/main.py

      - name: Check for New Articles
        id: check_changes
        run: |
          git status
          if git diff --quiet && git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit New Articles
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "AniTube Buzz Bot"
          git config user.email "bot@anitubebuzz.com"
          git add src/content/posts/
          git add data/published.json
          git commit -m "Auto: Add new anime articles - $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: Summary
        run: |
          echo "Auto publish completed!"
          echo "Time: $(date)"
