name: Auto Publish Anime Articles

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Cache GGUF Model
        uses: actions/cache@v4
        with:
          path: ~/.cache/gguf-models
          key: gguf-qwen25-1.5b-v1

      - name: Setup Model and llama.cpp
        run: |
          chmod +x scripts/setup_model.sh
          bash scripts/setup_model.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install feedparser==6.0.11 requests==2.31.0 python-slugify==8.0.4 python-dateutil==2.9.0

      - name: Show scripts
        run: |
          ls -la scripts
          echo "----- main.py -----"
          sed -n '1,40p' scripts/main.py

      - name: Run Auto Publisher
        run: |
          python scripts/main.py

      - name: Check for Changes
        id: check
        run: |
          if [ -n "$(git status --porcelain src/content/posts data/published.json)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "AniTube Buzz Bot"
          git config user.email "bot@anitubebuzz.com"
          git add src/content/posts data/published.json
          git commit -m "Auto: New anime articles - $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: Done
        run: echo "Done!"
